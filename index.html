<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css?family=Inconsolata&display=swap" rel="stylesheet" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  
  <!-- Default SEO tags - will be overridden by react-helmet -->
  <title>Decentraland Blog | Updates, Stories, and Community Moments</title>
  <meta
    name="description"
    content="Updates from across Decentraland. Announcements, events, community moments, and everything in between."
  />
  <link rel="canonical" href="https://decentraland.org/blog/" />
  
  <!-- Open Graph -->
  <meta property="og:site_name" content="Decentraland" />
  <meta
    property="og:title"
    content="Decentraland Blog | Updates, Stories, and Community Moments"
  />
  <meta
    property="og:description"
    content="Updates from across Decentraland. Announcements, events, community moments, and everything in between."
  />
  <meta property="og:image" content="https://cms-images.decentraland.org/ea2ybdmmn1kv/7tYISdowuJYIbSIDqij87H/f3524d454d8e29702792a6b674f5550d/GI_Landscape.Small.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://decentraland.org/blog/" />
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta
    name="twitter:title"
    content="Decentraland Blog | Updates, Stories, and Community Moments"
  />
  <meta
    name="twitter:description"
    content="Updates from across Decentraland. Announcements, events, community moments, and everything in between."
  />
  <meta name="twitter:image" content="https://cms-images.decentraland.org/ea2ybdmmn1kv/7tYISdowuJYIbSIDqij87H/f3524d454d8e29702792a6b674f5550d/GI_Landscape.Small.png" />
  
  <script src="https://t.contentsquare.net/uxa/c07af53c07b18.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
